<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#141824" />
    <title>Snack CRM｜今日のお客様ノート</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <!-- app.js を Chart より先に（defer は記述順で実行される）。CDN が遅い／失敗しても CRM 本体は動く -->
    <script src="app.js" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
      defer
    ></script>
  </head>
  <body>
    <a class="sr-only" href="#main">本文へスキップ</a>
    <div id="app" class="app-root"></div>
    <div id="modal-root" class="modal-root" aria-live="polite"></div>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
